<!DOCTYPE html>
<html>
<head>
    <title>Student CRUD</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f8f9ff;
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        li div {
            display: flex;
            gap: 8px;
        }

        /* Edit Button */
        li button:first-child {
            background: #28a745;
        }

        /* Delete Button */
        li button:last-child {
            background: #dc3545;
        }

        li button {
            width: auto;
            padding: 6px 10px;
            font-size: 13px;
            border-radius: 6px;
        }

        .section {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Student Form</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="email" placeholder="Enter Email">
    <input type="text" id="course" placeholder="Enter Course">

    <button onclick="addStudent()">Add Student</button>

    <div class="section">
        <h2>Student List</h2>
        <button onclick="loadStudents()">Load Students</button>

        <ul id="list"></ul>
    </div>

</div>

<script>
    const BASE_URL = "http://localhost:8080/students";

    // CREATE
    function addStudent() {
        const student = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            course: document.getElementById("course").value
        };

        fetch(BASE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(student)
        })
        .then(() => {
            clearForm();
            loadStudents();
        });
    }

    // READ
    function loadStudents() {
        fetch(BASE_URL)
            .then(res => res.json())
            .then(data => {
                let list = document.getElementById("list");
                list.innerHTML = "";

                data.forEach(s => {
                    let li = document.createElement("li");

                    li.innerHTML = `
                        ${s.id} | ${s.name} (${s.course})
                        <div>
                            <button onclick="editStudent(${s.id}, '${s.name}', '${s.email}', '${s.course}')">Edit</button>
                            <button onclick="deleteStudent(${s.id})">Delete</button>
                        </div>
                    `;

                    list.appendChild(li);
                });
            });
    }

    // DELETE
    function deleteStudent(id) {
        fetch(BASE_URL + "/" + id, {
            method: "DELETE"
        })
        .then(() => loadStudents());
    }

    // EDIT (fill form)
    function editStudent(id, name, email, course) {
        document.getElementById("name").value = name;
        document.getElementById("email").value = email;
        document.getElementById("course").value = course;

        // Change button behavior to UPDATE
        const btn = document.querySelector("button");
        btn.innerText = "Update Student";
        btn.onclick = () => updateStudent(id);
    }

    // UPDATE
    function updateStudent(id) {
        const student = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            course: document.getElementById("course").value
        };

        fetch(BASE_URL + "/" + id, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(student)
        })
        .then(() => {
            clearForm();
            document.querySelector("button").innerText = "Add Student";
            document.querySelector("button").onclick = addStudent;
            loadStudents();
        });
    }

    // Clear form
    function clearForm() {
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("course").value = "";
    }
</script>
</body>
</html>
