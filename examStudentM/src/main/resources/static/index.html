<!DOCTYPE html>
<html>
<head>
    <title>Student CRUD</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: white;
            margin-top: 20px;
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .grid {
            display: flex;
            gap: 30px;
        }

        .form-section {
            flex: 1;
        }

        .list-section {
            flex: 2;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .load-btn {
            width: 100%;
            margin-bottom: 15px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f8f9ff;
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions button {
            margin-left: 8px;
            padding: 6px 10px;
            font-size: 13px;
        }

        .edit-btn {
            background: #28a745;
        }

        .delete-btn {
            background: #dc3545;
        }

    </style>

</head>
<body>

<h1> Student Management Dashboard</h1>

<div class="container">

    <div class="grid">

        <!-- FORM -->
        <div class="form-section">
            <h2>Student Form</h2>

            <input type="text" id="name" placeholder="Enter Name">
            <input type="text" id="email" placeholder="Enter Email">
            <input type="text" id="course" placeholder="Enter Course">

            <button id="mainBtn" onclick="addStudent()">Add Student</button>
        </div>

        <!-- LIST -->
        <div class="list-section">
            <h2>Student List</h2>

            <button class="load-btn" onclick="loadStudents()">Load Students</button>

            <ul id="list"></ul>
        </div>

    </div>

</div>

<script>
    const BASE_URL = "http://localhost:8080/students";

    // CREATE
    function addStudent() {
        const student = {
            name: name.value,
            email: email.value,
            course: course.value
        };

        fetch(BASE_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(student)
        })
        .then(() => {
            clearForm();
            loadStudents();
        });
    }

    // READ
    function loadStudents() {
        fetch(BASE_URL)
        .then(res => res.json())
        .then(data => {
            list.innerHTML = "";

            data.forEach(s => {
                let li = document.createElement("li");

                li.innerHTML = `
                    ${s.id} | ${s.name} (${s.course})
                    <div class="actions">
                        <button class="edit-btn" onclick="editStudent(${s.id}, '${s.name}', '${s.email}', '${s.course}')">Edit</button>
                        <button class="delete-btn" onclick="deleteStudent(${s.id})">Delete</button>
                    </div>
                `;

                list.appendChild(li);
            });
        });
    }

    // DELETE
    function deleteStudent(id) {
        fetch(BASE_URL + "/" + id, { method: "DELETE" })
        .then(() => loadStudents());
    }

    // EDIT
    function editStudent(id, nameVal, emailVal, courseVal) {
        name.value = nameVal;
        email.value = emailVal;
        course.value = courseVal;

        mainBtn.innerText = "Update Student";
        mainBtn.onclick = () => updateStudent(id);
    }

    // UPDATE
    function updateStudent(id) {
        const student = {
            name: name.value,
            email: email.value,
            course: course.value
        };

        fetch(BASE_URL + "/" + id, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(student)
        })
        .then(() => {
            clearForm();
            mainBtn.innerText = "Add Student";
            mainBtn.onclick = addStudent;
            loadStudents();
        });
    }

    // CLEAR
    function clearForm() {
        name.value = "";
        email.value = "";
        course.value = "";
    }
</script>

</body>
</html>
